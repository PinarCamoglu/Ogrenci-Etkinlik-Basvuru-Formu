<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMÜ Etkinlik Başvuru Formu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #0056b3; }
        fieldset { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        legend { font-weight: bold; color: #0056b3; padding: 0 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .help-text { font-size: 0.8rem; color: #666; margin-top: 3px; }
        footer { font-size: 0.85rem; color: #555; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>OMÜ Etkinlik Başvuru Formu</h1>
        <p>Geleceğin teknolojilerini OMÜ'de keşfetmek için formu doldurun.</p>
    </header>

    <form action="https://httpbin.org/post" method="POST" enctype="multipart/form-data">
        
        <fieldset>
            <legend>Kişisel Bilgiler</legend>
            
            <div class="form-group">
                <label for="adSoyad">Ad Soyad:</label>
                <input type="text" id="adSoyad" name="adSoyad" required minlength="5" placeholder="Adınızı ve soyadınızı girin">
            </div>

            <div class="form-group">
                <label for="ogrenciNo">Öğrenci No:</label>
                <input type="text" id="ogrenciNo" name="ogrenciNo" pattern="[0-9]{8,10}" required placeholder="Örn: 20210101">
                <p class="help-text">Sadece 8-10 arası rakam girilmelidir.</p>
            </div>

            <div class="form-group">
                <label for="email">E-posta:</label>
                <input type="email" id="email" name="email" required placeholder="ornek@omu.edu.tr">
            </div>

            <div class="form-group">
                <label for="telefon">Telefon:</label>
                <input type="tel" id="telefon" name="telefon" pattern="0[0-9]{10}" placeholder="05XXXXXXXXX">
                <p class="help-text">Başında 0 olacak şekilde 11 hane.</p>
            </div>

            <div class="form-group">
                <label for="dogum">Doğum Tarihi:</label>
                <input type="date" id="dogum" name="dogum">
            </div>

            <div class="form-group">
                <label for="linkedin">LinkedIn / Web Sitesi:</label>
                <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/pinar">
            </div>
        </fieldset>

        <footer>
            <p><strong>Gizlilik / KVKK:</strong> Başvurunuz kapsamındaki veriler KVKK uyarınca korunmaktadır.</p>
        </footer>
    </form>
</div>

</body>
</html>
