<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OMÜ Etkinlik Başvuru Formu</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #f4f7f6;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      header {
        text-align: center;
        margin-bottom: 30px;
        border-bottom: 3px solid #0056b3;
      }
      fieldset {
        border: 1px solid #ddd;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 8px;
      }
      legend {
        font-weight: bold;
        color: #0056b3;
        padding: 0 10px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
      }
      .help-text {
        font-size: 0.8rem;
        color: #666;
        margin-top: 3px;
      }
      footer {
        font-size: 0.85rem;
        color: #555;
        text-align: center;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>OMÜ Etkinlik Başvuru Formu</h1>
        <p>Geleceğin teknolojilerini OMÜ'de keşfetmek için formu doldurun.</p>
      </header>

      <form
        action="https://httpbin.org/post"
        method="POST"
        enctype="multipart/form-data"
      >
        <fieldset>
          <legend>Kişisel Bilgiler</legend>

          <div class="form-group">
            <label for="adSoyad">Ad Soyad:</label>
            <input
              type="text"
              id="adSoyad"
              name="adSoyad"
              required
              minlength="5"
              placeholder="Adınızı ve soyadınızı girin"
            />
          </div>

          <div class="form-group">
            <label for="ogrenciNo">Öğrenci No:</label>
            <input
              type="text"
              id="ogrenciNo"
              name="ogrenciNo"
              pattern="[0-9]{8,10}"
              required
              placeholder="Örn: 20210101"
            />
            <p class="help-text">Sadece 8-10 arası rakam girilmelidir.</p>
          </div>

          <div class="form-group">
            <label for="email">E-posta:</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="ornek@omu.edu.tr"
            />
          </div>

          <div class="form-group">
            <label for="telefon">Telefon:</label>
            <input
              type="tel"
              id="telefon"
              name="telefon"
              pattern="0[0-9]{10}"
              placeholder="05XXXXXXXXX"
            />
            <p class="help-text">Başında 0 olacak şekilde 11 hane.</p>
          </div>

          <div class="form-group">
            <label for="dogum">Doğum Tarihi:</label>
            <input type="date" id="dogum" name="dogum" />
          </div>

          <div class="form-group">
            <label for="linkedin">LinkedIn / Web Sitesi:</label>
            <input
              type="url"
              id="linkedin"
              name="linkedin"
              placeholder="https://linkedin.com/in/pinar"
            />
          </div>
        </fieldset>

        <fieldset>
          <legend>Etkinlik ve Tercihler</legend>

          <div class="form-group">
            <label for="oturum">Katılmak İstediğiniz Oturum:</label>
            <select id="oturum" name="oturum">
              <optgroup label="Teknoloji">
                <option value="ai">Yapay Zeka</option>
                <option value="siber">Siber Güvenlik</option>
              </optgroup>
              <optgroup label="Geliştirme">
                <option value="web">Web Geliştirme</option>
                <option value="mobil">Mobil Uygulama</option>
              </optgroup>
            </select>
          </div>

          <div class="form-group">
            <label>Katılım Tipi:</label>
            <input
              type="radio"
              id="yuz-yuze"
              name="katilim"
              value="yuz-yuze"
              checked
              style="width: auto"
            />
            <label for="yuz-yuze" style="display: inline">Yüz yüze</label>
            <input
              type="radio"
              id="online"
              name="katilim"
              value="online"
              style="width: auto"
            />
            <label for="online" style="display: inline">Online</label>
          </div>

          <div class="form-group">
            <label>İlgilendiğiniz Teknolojiler (En az 5 seçenek):</label>

            <input
              type="checkbox"
              id="t1"
              name="tech"
              value="react"
              style="width: auto"
            />
            <label for="t1" style="display: inline">React</label>

            <input
              type="checkbox"
              id="t2"
              name="tech"
              value="python"
              style="width: auto"
            />
            <label for="t2" style="display: inline">Python</label>

            <input
              type="checkbox"
              id="t3"
              name="tech"
              value="docker"
              style="width: auto"
            />
            <label for="t3" style="display: inline">Docker</label>

            <input
              type="checkbox"
              id="t4"
              name="tech"
              value="cloud"
              style="width: auto"
            />
            <label for="t4" style="display: inline">Cloud</label>

            <input
              type="checkbox"
              id="t5"
              name="tech"
              value="unity"
              style="width: auto"
            />
            <label for="t5" style="display: inline">Unity</label>
          </div>

          <div class="form-group">
            <label for="motivasyon">Katılım Motivasyonu:</label>
            <textarea
              id="motivasyon"
              name="motivasyon"
              maxlength="500"
              required
              placeholder="Neden katılmak istiyorsunuz?"
            ></textarea>
          </div>
        </fieldset>

        <fieldset>
          <legend>Ek Bilgiler</legend>

          <div class="form-group">
            <label for="cv">CV Yükle (PDF veya Word):</label>
            <input type="file" id="cv" name="cv" accept=".pdf,.doc,.docx" />
          </div>

          <div class="form-group">
            <label for="gano"
              >Not Ortalaması (GANO): <span id="ganoDeger">2.00</span></label
            >
            <input
              type="range"
              id="gano"
              name="gano"
              min="0"
              max="4"
              step="0.01"
              value="2.00"
              style="cursor: pointer"
              oninput="
                document.getElementById('ganoDeger').innerText = this.value
              "
            />
          </div>

          <div class="form-group">
            <label for="tema">Yaka Kartı Renk Tercihi:</label>
            <input
              type="color"
              id="tema"
              name="tema"
              value="#0056b3"
              style="
                height: 40px;
                width: 60px;
                padding: 2px;
                display: inline-block;
                vertical-align: middle;
              "
            />
          </div>

          <div class="form-group">
            <label for="saat">Görüşme İçin Uygun Saat Dilimi:</label>
            <input type="time" id="saat" name="saat" />
          </div>

          <div class="form-group">
            <input
              type="checkbox"
              id="kvkk"
              name="kvkk"
              required
              style="width: auto"
            />
            <label for="kvkk" style="display: inline"
              >KVKK Metnini Okudum ve Onaylıyorum.</label
            >
          </div>
        </fieldset>

        <button type="submit">Başvuruyu Tamamla</button>

        <footer>
          <p>
            <strong>Gizlilik / KVKK:</strong> Başvurunuz kapsamındaki veriler
            KVKK uyarınca korunmaktadır.
          </p>
        </footer>
      </form>
    </div>
  </body>
</html>
